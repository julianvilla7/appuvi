<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Appuvi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#000000;--s:#111111;--s2:#1c1c1c;--s3:#282828;--br:rgba(255,255,255,.08);--br2:rgba(255,255,255,.15);--tx:#f5f0ee;--mu:#9C9A9A;--mu2:#b8b8b8;--inc:#10b981;--exp:#f43f5e;--don:#c47a5a;--sav:#3b82f6;--acc:#A35E47;--al:rgba(163,94,71,.18)}
.lm{--bg:#f2efed;--s:#ffffff;--s2:#faf8f6;--s3:#f0ebe8;--br:rgba(0,0,0,.09);--br2:rgba(0,0,0,.15);--tx:#1a1010;--mu:#9C9A9A;--mu2:#464646;--al:rgba(163,94,71,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;transition:background .2s,color .2s}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc)!important}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(163,94,71,.35);border-radius:4px}
#app{display:flex;height:100vh;overflow:hidden}
aside{width:222px;background:var(--s);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .22s}
aside.col{width:58px}
.logo{padding:14px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--br);height:56px}
.logo-ic{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#A35E47,#c47a5a);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.logo-tx{font-weight:800;font-size:14px;letter-spacing:-.4px;white-space:nowrap;background:linear-gradient(135deg,#c47a5a,#A35E47);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:9px;border:none;background:transparent;color:var(--mu2);width:100%;text-align:left;font-size:12px;white-space:nowrap;overflow:hidden;transition:all .13s}
.nb:hover{background:rgba(163,94,71,.1);color:var(--tx)}
.nb.on{background:var(--al);color:#c47a5a;font-weight:700}
.ni{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-bot{padding:8px 6px;border-top:1px solid var(--br);display:flex;flex-direction:column;gap:2px}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 9px;border-top:1px solid var(--br);margin-top:2px;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
header{height:56px;background:var(--s);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:13px}
.card{background:var(--s);border:1px solid var(--br);border-radius:13px;padding:15px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.bp{background:linear-gradient(135deg,#A35E47,#c47a5a);border:none;color:#fff;border-radius:9px;padding:8px 16px;font-size:12px;font-weight:700}
.bg{background:transparent;border:1px solid var(--br);color:var(--mu2);border-radius:9px;padding:7px 12px;font-size:11px;transition:all .13s}
.bg:hover{border-color:var(--acc);color:#c47a5a}
.ba{background:var(--al);border:1px solid rgba(163,94,71,.35);color:#c47a5a;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600}
.bd{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#f43f5e;border-radius:9px;padding:7px 12px;font-size:11px}
.inp{background:var(--s2);border:1px solid var(--br);color:var(--tx);border-radius:9px;padding:9px 12px;font-size:12px;width:100%}
.inp-s{padding:5px 9px;font-size:11px;border-radius:7px}
.lbl{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.bi{background:rgba(16,185,129,.15);color:#10b981;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.be{background:rgba(244,63,94,.15);color:#f43f5e;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.bdo{background:rgba(163,94,71,.15);color:#A35E47;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.bw{background:rgba(245,158,11,.15);color:#f59e0b;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.pb{background:var(--s3);border-radius:99px;overflow:hidden}
.pbi{border-radius:99px;transition:width .45s}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:6px 9px;text-align:left;color:var(--mu);font-weight:600;border-bottom:1px solid var(--br);font-size:9px;text-transform:uppercase}
td{padding:7px 9px;border-bottom:1px solid var(--br)}
tr:hover td{background:rgba(124,106,247,.03)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.modal{background:var(--s);border:1px solid var(--br2);border-radius:18px;padding:24px;width:430px;max-width:92vw;max-height:88vh;overflow-y:auto}
.modal-lg{width:600px}
.seg{display:flex;background:var(--s2);border-radius:9px;padding:2px;gap:2px;border:1px solid var(--br)}
.sbt{flex:1;padding:6px 8px;border-radius:7px;border:none;background:transparent;color:var(--mu2);font-size:11px;font-weight:500;transition:all .13s}
.sbt.on{background:var(--s);color:var(--tx);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.2)}
#toast{position:fixed;bottom:18px;right:18px;z-index:500;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.tst{padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.3);animation:su .2s ease}
@keyframes su{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cd{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;cursor:pointer;position:relative;border:1px solid transparent;background:transparent;color:var(--tx);transition:background .1s}
.cd:hover{background:var(--al)}
.cd.htx::after{content:'';position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:var(--acc)}
.cd.tod{border-color:var(--acc);color:#c47a5a;font-weight:700}
.cd.oth{color:var(--mu)}
.cd.sel{background:var(--al);color:#c47a5a;font-weight:700}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;cursor:pointer}
/* User color avatars */
.av-0{background:linear-gradient(135deg,#A35E47,#c47a5a)}
.av-1{background:linear-gradient(135deg,#464646,#6a6a6a)}
.av-2{background:linear-gradient(135deg,#9C9A9A,#bdbdbd)}
.av-3{background:linear-gradient(135deg,#8a4a38,#A35E47)}
.av-4{background:linear-gradient(135deg,#2a2a2a,#464646)}
.av-5{background:linear-gradient(135deg,#6b3d2e,#A35E47)}
.av-6{background:linear(135deg,#14b8a6,#2dd4bf)}
#lp{position:fixed;inset:0;background:#fff;display:flex;z-index:999;overflow:hidden}
.lm #lp{background:#fff}
/* Panel izquierdo - formulario */
#lp-left{flex:0 0 480px;display:flex;flex-direction:column;justify-content:center;padding:56px 64px;background:#ffffff;overflow-y:auto;min-height:100vh}
/* Force light colors in login panel regardless of theme */
#lp-left *{color-scheme:light}
#lp-left .linp{background:#fff;border:1.5px solid #e0ddd8;color:#1a1010 !important}
#lp-left label{color:#464646 !important}
#lp-left h1,#lp-left div{color:#1a1010}
/* Panel derecho - imagen/branding */
#lp-right{flex:1;background:linear-gradient(160deg,#1a0f0a 0%,#2d1810 40%,#A35E47 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:56px;position:relative;overflow:hidden}
#lp-right::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=900&q=80') center/cover no-repeat;opacity:.25}
#lp-right::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(163,94,71,.3) 50%,transparent 100%)}
.lp-right-content{position:relative;z-index:1}
@media(max-width:700px){#lp-right{display:none}#lp-left{flex:1;padding:36px 28px}}
/* Inputs login */
.linp{width:100%;border:1.5px solid #e0ddd8;border-radius:9px;padding:11px 14px;font-size:13px;color:#1a1010;background:#fff;font-family:inherit;transition:border-color .15s;outline:none}
.linp:focus{border-color:#A35E47}
.linp::placeholder{color:#b8b4ae}
/* Login button */
.lbtn{width:100%;padding:13px;background:#000;border:none;color:#fff;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.lbtn:hover{background:#1a1010}
.lbtn-outline{width:100%;padding:11px;background:#fff;border:1.5px solid #e0ddd8;color:#1a1010;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;transition:border-color .15s}
.lbtn-outline:hover{border-color:#A35E47}
.ldivider{display:flex;align-items:center;gap:12px;margin:16px 0;color:#b8b4ae;font-size:12px}
.ldivider::before,.ldivider::after{content:'';flex:1;height:1px;background:#e0ddd8}
.llink{background:none;border:none;color:#A35E47;font-weight:600;cursor:pointer;font-size:13px;text-decoration:underline;text-underline-offset:3px;font-family:inherit}
.lchk{width:14px;height:14px;accent-color:#A35E47;cursor:pointer}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fi .18s ease}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600}
.online-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;flex-shrink:0}
/* User card in admin */
.ucard{background:var(--s);border:1px solid var(--br);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.ucard:hover{border-color:rgba(163,94,71,.35)}
.role-badge-admin{background:rgba(163,94,71,.15);color:#A35E47;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700}
.role-badge-user{background:rgba(16,185,129,.15);color:#10b981;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700}
.status-active{background:rgba(16,185,129,.15);color:#10b981;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700}
.status-inactive{background:rgba(244,63,94,.15);color:#f43f5e;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700}
</style>
</head>
<body>

</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">
  <aside id="sb">
    <div class="logo">

<script>
// ════════════════════════════════════════
// CONSTANTES
// ════════════════════════════════════════
const MO=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MF=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const CATS={
  income:["Salario","Freelance","Inversiones","Ventas","Arriendo","Bonificación","Comisiones","Otros ingresos"],
  expense:["Alimentación","Transporte","Vivienda","Salud","Educación","Entretenimiento","Ropa","Servicios","Tecnología","Deudas","Seguros","Restaurantes","Mascotas","Donación ONG","Donación Iglesia","Donación Familia","Donación Amigos","Donación Causas sociales","Donación Cruz Roja","Otros"],
};
const CC=["#A35E47","#10b981","#f43f5e","#f59e0b","#3b82f6","#ec4899","#14b8a6","#ef4444","#8b5cf6","#06b6d4","#84cc16","#f97316"];
const AV_COLORS=["av-0","av-1","av-2","av-3","av-4","av-5"];
const nowM=new Date().getMonth(), nowY=new Date().getFullYear();
const tod=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt=n=>new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n||0);
const fmtK=n=>n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(0)}K`:fmt(n);
const fmtP=n=>`${Math.round(n||0)}%`;
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

// ════════════════════════════════════════
// SUPABASE CLIENT
// ════════════════════════════════════════
const SUPA_URL = "https://ytsyxmzscwkheoyyckgf.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0c3l4bXpzY3draGVveXlja2dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNzgwNDMsImV4cCI6MjA5NTg1NDA0M30.U75AnxW9FVxWKWt73u1q7vAhJzuGr9FnPyTpRbvcm4M";
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ════════════════════════════════════════
// SUPABASE: AUTH
// ════════════════════════════════════════
async function doLogin(){
  const em = document.getElementById("le")?.value.trim().toLowerCase();
  const pw = document.getElementById("lp2")?.value;
  const err = document.getElementById("lerr");
  if(!em||!pw){if(err){err.textContent="Completa todos los campos";err.style.display="";}return;}
  if(err) err.style.display="none";
  showLoginLoading(true);
  try{
    const {data,error} = await supa.auth.signInWithPassword({email:em,password:pw});
    showLoginLoading(false);
    if(error){
      const msg = error.message==="Invalid login credentials"
        ? "Email o contraseña incorrectos"
        : (error.message==="Failed to fetch"||error.message?.includes("fetch"))
          ? "Sin conexión. Verifica tu internet e intenta de nuevo."
          : error.message;
      if(err){err.textContent=msg;err.style.display="";}
      return;
    }
    await afterLogin(data.user);
  }catch(e){
    showLoginLoading(false);
    const msg = e.message?.includes("fetch")
      ? "Sin conexión. Verifica tu internet e intenta de nuevo."
      : "Error inesperado: "+e.message;
    if(err){err.textContent=msg;err.style.display="";}
    console.error("doLogin error:",e);
  }
}

async function doRegister(){
  const name = document.getElementById("rn")?.value.trim();
  const em   = document.getElementById("re")?.value.trim().toLowerCase();
  const pw   = document.getElementById("rp")?.value;
  const pw2  = document.getElementById("rp2")?.value;
  const err  = document.getElementById("rerr");
  if(!name||!em||!pw||!pw2){if(err){err.textContent="Completa todos los campos";err.style.display="";}return;}
  if(pw.length<6){if(err){err.textContent="La contraseña debe tener al menos 6 caracteres";err.style.display="";}return;}
  if(pw!==pw2){if(err){err.textContent="Las contraseñas no coinciden";err.style.display="";}return;}
  if(err) err.style.display="none";
  showRegisterLoading(true);
  try{
    const {data,error} = await supa.auth.signUp({
      email:em, password:pw,
      options:{data:{name, role:"user"}}
    });
    showRegisterLoading(false);
    if(error){
      const msg = (error.message==="Failed to fetch"||error.message?.includes("fetch"))
        ? "Sin conexión. Verifica tu internet e intenta de nuevo."
        : error.message;
      if(err){err.textContent=msg;err.style.display="";}
      return;
    }
    toast(`¡Bienvenido/a, ${name}! 🎉`);
    await afterLogin(data.user);
  }catch(e){
    showRegisterLoading(false);
    const msg = e.message?.includes("fetch")
      ? "Sin conexión. Verifica tu internet e intenta de nuevo."

async function afterLogin(authUser){

  try{
    // Get profile
    const {data:profile, error:profileErr} = await supa.from("profiles").select("*").eq("id",authUser.id).single();
    if(profileErr && profileErr.code!=="PGRST116"){
      toast("Error cargando perfil: "+(profileErr.message?.includes("fetch")?"Sin conexión":profileErr.message),"err");

    }

      await new Promise(r=>setTimeout(r,1200));
      const {data:p2, error:p2err} = await supa.from("profiles").select("*").eq("id",authUser.id).single();

      ST.user = {...p2, uid:p2.id, avatarColor:p2.avatar_color||"av-0"};
    } else {
      ST.user = {...profile, uid:profile.id, avatarColor:profile.avatar_color||"av-0"};
    }
    document.getElementById("lp").style.display="none";
    document.getElementById("app").style.display="flex";
    await loadUserState();

  }catch(e){
    const msg = e.message?.includes("fetch")
      ? "Sin conexión al servidor. Verifica tu internet."
      : "Error al iniciar sesión: "+e.message;
    toast(msg,"err");

async function loadUserState(){
  if(!ST.user) return;
  showLoadingOverlay(true);
  try{
    const uid = ST.user.uid;
    const [txRes,budRes,goalRes,debtRes,recRes,notifRes,profRes] = await Promise.all([
      supa.from("transactions").select("*").eq("user_id",uid).order("date",{ascending:false}),
      supa.from("budgets").select("*").eq("user_id",uid),
      supa.from("goals").select("*").eq("user_id",uid),
      supa.from("debts").select("*").eq("user_id",uid),
      supa.from("recurring").select("*").eq("user_id",uid),
      supa.from("notifications").select("*").eq("user_id",uid).order("created_at",{ascending:false}),
      supa.from("profiles").select("*").eq("id",uid).single(),
    ]);

    // Transactions
    ST.txs = (txRes.data||[]).map(t=>({
      id:t.id, type:t.type, amount:+t.amount,
      category:t.category, description:t.description,
      date:t.date, month:t.month, year:t.year
    }));
    if(!ST.txs.length && ST.user.role!=="admin") ST.txs=seedTxs();

    // Budgets
    ST.budgets = {};
    (budRes.data||[]).forEach(b=>{ST.budgets[b.category]=+b.amount;});
    if(!Object.keys(ST.budgets).length) ST.budgets=seedB();

    // Goals
    ST.goals = (goalRes.data||[]).map(g=>({
      id:g.id, name:g.name, target:+g.target, saved:+g.saved,
      icon:g.icon, color:g.color, deadline:g.deadline, note:g.note
    }));
    if(!ST.goals.length && ST.user.role!=="admin") ST.goals=seedG();

    // Debts
    ST.debts = (debtRes.data||[]).map(d=>({
      id:d.id, name:d.name, total:+d.total, paid:+d.paid,
      rate:+d.rate, quota:+d.quota, nextDate:d.next_date,
      icon:d.icon, color:d.color, notes:d.notes
    }));
    if(!ST.debts.length && ST.user.role!=="admin") ST.debts=seedDebts();

    // Recurring
    ST.recurring = (recRes.data||[]).map(r=>({
      id:r.id, type:r.type, amount:+r.amount,
      category:r.category, description:r.description,
      day:r.day, active:r.active, color:r.color
    }));
    if(!ST.recurring.length && ST.user.role!=="admin") ST.recurring=seedRecurring();

    // Notifications
    ST.notifs = (notifRes.data||[]).map(n=>({
      id:n.id, title:n.title, body:n.body,
      icon:n.icon, color:n.color, date:n.date, read:n.read,
      createdAt:n.created_at
    }));

    // Profile & settings
    const prof = profRes.data;
    if(prof){
      ST.settings = prof.settings||{currency:"COP",startOfMonth:1,showCents:false};
      ST.user.name = prof.name;
      ST.user.role = prof.role;
      ST.user.avatar = prof.avatar||ST.user.name[0].toUpperCase();
      ST.user.avatarColor = prof.avatar_color||"av-0";
      ST.user.active = prof.active;
    }
    // Dark mode from localStorage
    try{const d=localStorage.getItem("appuvi_dark");if(d!==null)ST.dark=d==="1";}catch{}
    ST.fM = nowM; ST.fY = nowY;

    // Seed data to DB if first login
    if(ST.user.role!=="admin"){
      if(!txRes.data?.length) await seedDataToDB();
    }
  }catch(e){
    console.error("loadUserState error:",e);
    const msg = e.message?.includes("fetch")
      ? "Sin conexión al cargar datos. Verifica tu internet y recarga la página."
      : "Error cargando datos: "+e.message;
    toast(msg,"err");
  }
  showLoadingOverlay(false);
}

async function seedDataToDB(){
  // Push seed txs to DB on first login
  const txs=seedTxs();
  for(const tx of txs.slice(0,20)){ // seed only recent 20 for speed
    await saveTxToDB(tx);
  }
  ST.txs=txs;
  const bEntries=Object.entries(seedB()).map(([category,amount])=>({user_id:ST.user.uid,category,amount}));
  await supa.from("budgets").upsert(bEntries,{onConflict:"user_id,category"});
  const gSeed=seedG();
  for(const g of gSeed) await saveGoalToDB(g);
  ST.goals=gSeed;
}

function seedTxs(){
  const l=[];let id=1;
  const inc=[[4800000,"Salario mensual","Salario",5],[950000,"Proyecto freelance","Freelance",12],[280000,"Inversión ETF","Inversiones",20]];
  const exp=[[950000,"Alimentación",8],[480000,"Vivienda",1],[200000,"Transporte",15],[130000,"Servicios",5],[180000,"Entretenimiento",10],[90000,"Salud",18],[60000,"Educación",22],[120000,"Restaurantes",25]];
  for(let i=0;i<12;i++){
    const m=((nowM-i)+12)%12,y=nowY-(nowM-i<0?1:0);
    const d=day=>`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    inc.forEach(([a,desc,cat,day])=>l.push({id:id++,type:"income",amount:a+Math.random()*300000,category:cat,description:desc,date:d(day),month:m,year:y}));
    exp.forEach(([a,cat,day])=>l.push({id:id++,type:"expense",amount:a+Math.random()*60000,category:cat,description:`Gasto ${cat.toLowerCase()}`,date:d(day),month:m,year:y}));
    l.push({id:id++,type:"expense",amount:120000+Math.random()*80000,category:"Donación ONG",description:"Donación mensual fundación",date:d(28),month:m,year:y});
  }
  return l;
}

function getF(){return ST.txs.filter(t=>t.month===ST.fM&&t.year===ST.fY);}
function getS(txs){
  const inc=txs.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const exp=txs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  return{inc,exp,don:0,bal:inc-exp,rate:inc>0?(inc-exp)/inc*100:0};
}
function getM12(){
  return Array.from({length:12},(_,i)=>{
    const m=((nowM-11+i)+12)%12,y=nowY-(nowM-11+i<0?1:0);
    const t=ST.txs.filter(x=>x.month===m&&x.year===y);
    const inc=t.filter(x=>x.type==="income").reduce((a,x)=>a+x.amount,0);
    const exp=t.filter(x=>x.type==="expense").reduce((a,x)=>a+x.amount,0);
    return{label:MO[m],m,y,inc,exp,don:0,net:inc-exp};
  });
}
function getCE(txs){
  const map={};
  txs.filter(t=>t.type==="expense").forEach(t=>{map[t.category]=(map[t.category]||0)+t.amount;});
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}
function getAlerts(txs){
  return Object.entries(ST.budgets).map(([cat,limit])=>{
    const spent=txs.filter(t=>t.type==="expense"&&t.category===cat).reduce((a,t)=>a+t.amount,0);
    return{cat,limit,spent,pct:limit>0?spent/limit*100:0};
  }).filter(b=>b.pct>70).sort((a,b)=>b.pct-a.pct);
}

function toggleDark(){
  ST.dark=!ST.dark;
  document.body.classList.toggle("lm",!ST.dark);
  const di=document.getElementById("di"),dl=document.getElementById("dl");
  if(di)di.textContent=ST.dark?"☀":"🌙";
  if(dl)dl.textContent=ST.dark?"Modo claro":"Modo oscuro";
  save();
}
function toggleSB(){
  ST.sbOpen=!ST.sbOpen;
  document.getElementById("sb").classList.toggle("col",!ST.sbOpen);
  document.getElementById("si").textContent=ST.sbOpen?"◁":"▷";
  document.getElementById("sl").textContent=ST.sbOpen?"Colapsar":"Expandir";
}

async function _initAppBase(){
  document.body.classList.toggle("lm",!ST.dark);
  // Build nav
  document.getElementById("nav").innerHTML=NAVS
    .filter(n=>!n.admin||ST.user?.role==="admin")
    .map(n=>`<button class="nb${ST.page===n.id?" on":""}" id="n-${n.id}" onclick="go('${n.id}')"><span class="ni">${n.icon}</span><span>${n.label}</span></button>`)
    .join("");
  // Filters
  const fm=document.getElementById("fm"),fy=document.getElementById("fy");
  fm.innerHTML=MF.map((m,i)=>`<option value="${i}"${i===ST.fM?" selected":""}>${m}</option>`).join("");
  fy.innerHTML=[2023,2024,2025,2026].map(y=>`<option${y===ST.fY?" selected":""}>${y}</option>`).join("");
  // Topbar user
  const u=ST.user;
  document.getElementById("ta").textContent=u.avatar;
  document.getElementById("ta").className=`av ${u.avatarColor}`;
  document.getElementById("ua").textContent=u.avatar;
  document.getElementById("ua").className=`av ${u.avatarColor}`;
  document.getElementById("un").textContent=u.name;
  document.getElementById("ur").textContent=u.role==="admin"?"Administrador":"Usuario";
  document.getElementById("di").textContent=ST.dark?"☀":"🌙";
  document.getElementById("dl").textContent=ST.dark?"Modo claro":"Modo oscuro";
  go("dashboard");
}

function onFC(){
  ST.fM=+document.getElementById("fm").value;
  ST.fY=+document.getElementById("fy").value;
  render();
}

function go(page){
  ST.page=page;
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));
  const nb=document.getElementById("n-"+page);if(nb)nb.classList.add("on");
  document.getElementById("pt").textContent=NAVS.find(n=>n.id===page)?.label||page;
  const alerts=getAlerts(getF());
  const ab=document.getElementById("ab");
  if(alerts.length){ab.textContent=`⚠ ${alerts.length} alerta${alerts.length>1?"s":""}`;ab.style.display="";}
  else ab.style.display="none";
  render();
}

let _ch={};
function destroyCharts(){Object.values(_ch).forEach(c=>{try{c.destroy()}catch{}});_ch={};}
function initCharts(){
  destroyCharts();
  if(typeof Chart==="undefined")return;
  const gd=ST.dark?"rgba(255,255,255,.05)":"rgba(0,0,0,.05)";
  const gt=ST.dark?"#5a5a7a":"#8888aa";
  const sc={x:{ticks:{color:gt,font:{size:9}},grid:{color:gd}},y:{ticks:{color:gt,font:{size:9},callback:v=>fmtK(v)},grid:{color:gd}}};
  const m12=getM12(),txs=getF(),ce=getCE(txs);
  const dm=document.getElementById("ch-d");
  if(dm){
    const S=getS(txs);
    const segs=[{v:S.exp,c:"#f43f5e",l:"Gastos"},{v:Math.max(0,S.bal),c:"#3b82f6",l:"Ahorro"}].filter(s=>s.v>0);
    if(segs.length)_ch.d=new Chart(dm.getContext("2d"),{type:"doughnut",data:{labels:segs.map(s=>s.l),datasets:[{data:segs.map(s=>s.v),backgroundColor:segs.map(s=>s.c),borderWidth:2,borderColor:ST.dark?"#0f0f1a":"#fff"}]},options:{cutout:"65%",responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});
  }
  const mc=document.getElementById("ch-m");
  if(mc){
    if(ST.chtab==="bar")_ch.m=new Chart(mc.getContext("2d"),{type:"bar",data:{labels:m12.map(m=>m.label),datasets:[{label:"Ingresos",data:m12.map(m=>m.inc),backgroundColor:"#10b98170",borderColor:"#10b981",borderWidth:1.5,borderRadius:3},{label:"Egresos",data:m12.map(m=>m.exp),backgroundColor:"#f43f5e70",borderColor:"#f43f5e",borderWidth:1.5,borderRadius:3},]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:sc}});
    else if(ST.chtab==="line")_ch.m=new Chart(mc.getContext("2d"),{type:"line",data:{labels:m12.map(m=>m.label),datasets:[{label:"Ahorro",data:m12.map(m=>m.net),borderColor:"#A35E47",backgroundColor:"rgba(163,94,71,.14)",fill:true,tension:.4,pointRadius:3,pointBackgroundColor:"#A35E47",borderWidth:2},{label:"Ingresos",data:m12.map(m=>m.inc),borderColor:"#10b981",backgroundColor:"transparent",tension:.4,pointRadius:2,borderWidth:2,borderDash:[4,4]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:sc}});
    else if(ST.chtab==="area")_ch.m=new Chart(mc.getContext("2d"),{type:"line",data:{labels:m12.map(m=>m.label),datasets:[{label:"Ingresos",data:m12.map(m=>m.inc),borderColor:"#10b981",backgroundColor:"rgba(16,185,129,.14)",fill:true,tension:.4,borderWidth:2,pointRadius:2},{label:"Egresos",data:m12.map(m=>m.exp),borderColor:"#f43f5e",backgroundColor:"rgba(244,63,94,.1)",fill:true,tension:.4,borderWidth:2,pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:sc}});
    else if(ST.chtab==="donut"&&ce.length)_ch.m=new Chart(mc.getContext("2d"),{type:"doughnut",data:{labels:ce.map(c=>c[0]),datasets:[{data:ce.map(c=>c[1]),backgroundColor:ce.map((_,i)=>CC[i%CC.length]),borderWidth:2,borderColor:ST.dark?"#0f0f1a":"#fff",hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});
  }
}

function render(){
  const pages={dashboard,transactions,charts,calendar,budgets,goals,debts,recurring,reports,analysis,notifications,import:importPage,settings,audit,weekly,profile,admin};
  (pages[ST.page]||dashboard)();
  setTimeout(initCharts,60);
}

// ANÁLISIS: COMPARATIVO + PROYECCIÓN
// ════════════════════════════════════════
function analysis(){
  const m12=getM12();

  // Mes actual y anterior
  const curM = m12[m12.length-1];  // mes más reciente en el array
  const prevM = m12[m12.length-2];

  // Calcular mes seleccionado vs anterior
  const selIdx = m12.findIndex(m=>m.m===ST.fM && m.y===ST.fY);
  const selM  = selIdx>=0 ? m12[selIdx]   : curM;
  const prevSel= selIdx>0 ? m12[selIdx-1] : null;

  const diff = (cur,prev) => prev>0 ? ((cur-prev)/prev)*100 : cur>0?100:0;
  const arrow = (d) => d>0 ? `<span style="color:var(--inc)">▲ ${fmtP(Math.abs(d))}</span>` : d<0 ? `<span style="color:var(--exp)">▼ ${fmtP(Math.abs(d))}</span>` : `<span style="color:var(--mu)">— 0%</span>`;

  // Promedios últimos 3, 6, 12 meses
  const avg = (n,field) => {
    const slice = m12.slice(-n);
    return slice.reduce((a,m)=>a+m[field],0)/slice.length;
  };
  const avgInc3=avg(3,"inc"), avgExp3=avg(3,"exp");
  const avgInc6=avg(6,"inc"), avgExp6=avg(6,"exp");
  const avgInc12=avg(12,"inc"), avgExp12=avg(12,"exp");

  // Proyección a futuro basada en tendencia lineal (últimos 6 meses)
  function linearTrend(data){
    const n=data.length;
    const sx=data.reduce((a,_,i)=>a+i,0);
    const sy=data.reduce((a,v)=>a+v,0);
    const sxy=data.reduce((a,v,i)=>a+i*v,0);
    const sx2=data.reduce((a,_,i)=>a+i*i,0);
    const slope=(n*sxy-sx*sy)/(n*sx2-sx*sx);
    const intercept=(sy-slope*sx)/n;
    return {slope, intercept, next:(steps)=>Math.max(0,intercept+slope*(n-1+steps))};
  }

  const incData = m12.slice(-6).map(m=>m.inc);
  const expData = m12.slice(-6).map(m=>m.exp);
  const trendInc = linearTrend(incData);
  const trendExp = linearTrend(expData);

  const proj = Array.from({length:6},(_,i)=>({
    label: (()=>{
      const d=new Date(ST.fY, ST.fM+i+1,1);
      return MO[d.getMonth()]+" "+d.getFullYear();
    })(),
    inc: trendInc.next(i+1),
    exp: trendExp.next(i+1),
  }));

  // Salud financiera score
  const savingRate = selM.inc>0?(selM.inc-selM.exp)/selM.inc*100:0;
  const expRatio   = selM.inc>0?selM.exp/selM.inc*100:100;
  let healthScore  = 0;
  if(savingRate>=20) healthScore+=40; else if(savingRate>=10) healthScore+=20; else if(savingRate>=0) healthScore+=10;
  if(expRatio<=60) healthScore+=30; else if(expRatio<=80) healthScore+=15;
  if(selM.inc>0) healthScore+=20;
  
  const healthLabel = healthScore>=80?"Excelente 🟢":healthScore>=60?"Bueno 🟡":healthScore>=40?"Regular 🟠":"Mejorar 🔴";
  const healthColor = healthScore>=80?"#10b981":healthScore>=60?"#f59e0b":healthScore>=40?"#f97316":"#f43f5e";

  document.getElementById("content").innerHTML=`

  <!-- Tabs -->
  <div style="display:flex;gap:5px;flex-wrap:wrap" id="atabs">
    ${[["comparativo","📊 Comparativo"],["proyeccion","📈 Proyección"],["salud","💡 Salud financiera"],["tendencia","🔍 Tendencias"]].map(([v,l])=>`<button class="bg${ST._atab===v||(!ST._atab&&v==='comparativo')?" ba":""}" onclick="ST._atab='${v}';analysis()">${l}</button>`).join("")}
  </div>

  ${(!ST._atab||ST._atab==="comparativo")?`
  <!-- ── COMPARATIVO ── -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div class="card" style="grid-column:1/-1">
      <div style="font-size:12px;font-weight:700;margin-bottom:2px">Comparativo: ${MF[selM.m]} ${selM.y} vs ${prevSel?MF[prevSel.m]+" "+prevSel.y:"mes anterior"}</div>
      <div style="font-size:10px;color:var(--mu);margin-bottom:14px">Variación porcentual respecto al mes previo</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${[
          {l:"Ingresos",cur:selM.inc,prev:prevSel?.inc||0,c:"var(--inc)"},
          {l:"Egresos",cur:selM.exp,prev:prevSel?.exp||0,c:"var(--exp)"},
          
          {l:"Ahorro",cur:Math.max(0,selM.net),prev:Math.max(0,prevSel?.net||0),c:"var(--sav)"},
        ].map(k=>{
          const d=diff(k.cur,k.prev);
          return`<div class="card" style="border-color:${d>0&&k.l!=="Egresos"?"rgba(16,185,129,.25)":d<0&&k.l==="Egresos"?"rgba(16,185,129,.25)":d!==0?"rgba(244,63,94,.2)":"var(--br)"}">
            <div style="font-size:10px;color:var(--mu);margin-bottom:5px">${k.l}</div>
            <div style="font-size:17px;font-weight:800;color:${k.c};margin-bottom:4px">${fmtK(k.cur)}</div>
            <div style="font-size:10px;color:var(--mu);margin-bottom:4px">Anterior: ${fmtK(k.prev)}</div>
            <div style="font-size:11px;font-weight:700">${arrow(k.l==="Egresos"?-d:d)}</div>
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>

  <!-- Tabla 12 meses con delta -->
  <div class="card">
    <div style="font-size:12px;font-weight:700;margin-bottom:13px">Evolución mensual con variación</div>
    <div style="overflow-x:auto">
      <table style="min-width:640px">
        <thead><tr>${["Mes","Ingresos","Δ Ing","Egresos","Δ Eg","Ahorro","% Ahorro"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
        <tbody>
          ${[...m12].reverse().map((m,i,arr)=>{
            const prev=arr[i+1];
            const dI=prev?diff(m.inc,prev.inc):null;
            const dE=prev?diff(m.exp,prev.exp):null;
            const sav=m.inc-m.exp, p=m.inc>0?sav/m.inc*100:0;
            const delta=(v,inv=false)=>v===null?`<span style="color:var(--mu)">—</span>`:v>0?`<span style="color:${inv?"var(--exp)":"var(--inc)"}">▲${fmtP(Math.abs(v))}</span>`:`<span style="color:${inv?"var(--inc)":"var(--exp)"}">▼${fmtP(Math.abs(v))}</span>`;
            return`<tr>
              <td><strong>${m.label} ${m.y}</strong></td>
              <td style="color:var(--inc);font-weight:600">${fmt(m.inc)}</td>
              <td>${delta(dI)}</td>
              <td style="color:var(--exp);font-weight:600">${fmt(m.exp)}</td>
              <td>${delta(dE,true)}</td>
              <td style="color:${sav>=0?"var(--inc)":"var(--exp)"};font-weight:700">${fmt(sav)}</td>
              <td><span style="background:${p>=20?"rgba(16,185,129,.15)":p>=10?"rgba(245,158,11,.15)":"rgba(244,63,94,.15)"};color:${p>=20?"#10b981":p>=10?"#f59e0b":"#f43f5e"};padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700">${fmtP(p)}</span></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  </div>`:""}

  ${ST._atab==="proyeccion"?`
  <!-- ── PROYECCIÓN ── -->
  <div class="card">
    <div style="font-size:12px;font-weight:700;margin-bottom:4px">Proyección financiera — próximos 6 meses</div>
    <div style="font-size:10px;color:var(--mu);margin-bottom:14px">Basada en tendencia lineal de los últimos 6 meses. Referencial, no garantizada.</div>
    <div style="position:relative;height:260px"><canvas id="ch-proj"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
    ${proj.map(p=>{
      const sav=p.inc-p.exp, rate=p.inc>0?sav/p.inc*100:0;
      return`<div class="card">
        <div style="font-size:11px;font-weight:700;margin-bottom:8px">${p.label}</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--mu)">Ing. proyectado</span><span style="font-size:11px;font-weight:700;color:var(--inc)">${fmtK(p.inc)}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--mu)">Eg. proyectado</span><span style="font-size:11px;font-weight:700;color:var(--exp)">${fmtK(p.exp)}</span></div>
          <div style="border-top:1px solid var(--br);padding-top:5px;display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--mu)">Ahorro est.</span><span style="font-size:12px;font-weight:800;color:${sav>=0?"var(--inc)":"var(--exp)"}">${fmtK(sav)}</span></div>
          <div>${prog(Math.max(0,rate),"var(--sav)")}</div>
          <div style="text-align:right;font-size:9px;color:var(--mu)">${fmtP(rate)} ahorro</div>
        </div>
      </div>`;
    }).join("")}
  </div>
  <div class="card">
    <div style="font-size:12px;font-weight:700;margin-bottom:12px">Promedio por períodos</div>
    <div style="overflow-x:auto"><table style="min-width:400px">
      <thead><tr>${["Período","Ingreso prom.","Egreso prom.","Ahorro prom.","Tasa ahorro"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>
        ${[[3,"Últimos 3 meses"],[6,"Últimos 6 meses"],[12,"Últimos 12 meses"]].map(([n,label])=>{
          const ai=avg(n,"inc"),ae=avg(n,"exp"),sav=ai-ae,rate=ai>0?sav/ai*100:0;
          return`<tr>
            <td><strong>${label}</strong></td>
            <td style="color:var(--inc);font-weight:600">${fmt(ai)}</td>
            <td style="color:var(--exp);font-weight:600">${fmt(ae)}</td>
            <td style="color:${sav>=0?"var(--inc)":"var(--exp)"};font-weight:700">${fmt(sav)}</td>
            <td><span style="background:${rate>=20?"rgba(16,185,129,.15)":rate>=10?"rgba(245,158,11,.15)":"rgba(244,63,94,.15)"};color:${rate>=20?"#10b981":rate>=10?"#f59e0b":"#f43f5e"};padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700">${fmtP(rate)}</span></td>
          </tr>`;
        }).join("")}
      </tbody>
    </table></div>
  </div>`:""}

  ${ST._atab==="salud"?`
  <!-- ── SALUD FINANCIERA ── -->
  <div style="display:grid;grid-template-columns:280px 1fr;gap:12px;align-items:start">
    <div class="card" style="text-align:center">
      <div style="font-size:12px;font-weight:700;margin-bottom:16px">Score Financiero</div>
      <svg viewBox="0 0 200 120" style="width:180px;display:block;margin:0 auto">
        <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="rgba(128,128,200,.12)" stroke-width="16" stroke-linecap="round"/>
        <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="${healthColor}" stroke-width="16" stroke-linecap="round" stroke-dasharray="${healthScore*2.51} 251" stroke-dashoffset="0"/>
        <text x="100" y="95" text-anchor="middle" fill="${healthColor}" font-size="32" font-weight="800">${healthScore}</text>
        <text x="100" y="112" text-anchor="middle" fill="var(--mu)" font-size="9">/100</text>
      </svg>
      <div style="font-size:16px;font-weight:800;color:${healthColor};margin-top:8px">${healthLabel}</div>
      <div style="font-size:10px;color:var(--mu);margin-top:4px">${MF[selM.m]} ${selM.y}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="card">
        <div style="font-size:12px;font-weight:700;margin-bottom:12px">Indicadores clave</div>
        ${[
          {l:"Tasa de ahorro",v:fmtP(savingRate),ok:savingRate>=20,warn:savingRate>=10,tip:savingRate>=20?"Excelente, superas el 20% recomendado":savingRate>=10?"Aceptable, intenta llegar al 20%":"Crítico, intenta reducir gastos"},
          {l:"Ratio gastos/ingresos",v:fmtP(expRatio),ok:expRatio<=60,warn:expRatio<=80,tip:expRatio<=60?"Muy sano, tus gastos son controlados":expRatio<=80?"Moderado, hay margen de mejora":"Alto, tus gastos consumen la mayoría de ingresos",inv:true},
          {l:"Ingresos del mes",v:fmtK(selM.inc),ok:selM.inc>0,warn:false,tip:selM.inc>0?"Tienes ingresos registrados este mes":"Sin ingresos registrados"},

        ].map(i=>`
        <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--br)">
          <div style="width:28px;height:28px;border-radius:8px;background:${i.ok?"rgba(16,185,129,.15)":i.warn?"rgba(245,158,11,.15)":"rgba(244,63,94,.15)"};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${i.ok?"✓":i.warn?"▲":"✕"}</div>
          <div style="flex:1">

      }).filter(c=>c.avg>0).sort((a,b)=>Math.abs(b.slope)-Math.abs(a.slope)).slice(0,6);

          {label:"Eg. proyectado",data:[...Array(5).fill(null),m12.slice(-6)[5]?.exp||0,...proj.map(p=>p.exp)],borderColor:"#f43f5e",backgroundColor:"rgba(244,63,94,.06)",fill:true,tension:.4,pointRadius:3,borderWidth:2,borderDash:[5,5]},
        ]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:"index"}},scales:sc}});
    }

    // Tendencia chart
    const tc2=document.getElementById("ch-trend");
    if(tc2){
      const labels=m12.map(m=>m.label);
      // Generar líneas de tendencia
      const genTrend=(data,trend)=>data.map((_,i)=>Math.max(0,trend.intercept+trend.slope*i));
      const incAll=m12.map(m=>m.inc), expAll=m12.map(m=>m.exp);
      const tI=linearTrend(incAll), tE=linearTrend(expAll);
      _ch.trend=new Chart(tc2.getContext("2d"),{type:"line",data:{

          {label:"Tendencia Ing",data:genTrend(incAll,tI),borderColor:"#10b981",backgroundColor:"transparent",tension:0,pointRadius:0,borderWidth:2,borderDash:[6,3]},
          {label:"Tendencia Eg",data:genTrend(expAll,tE),borderColor:"#f43f5e",backgroundColor:"transparent",tension:0,pointRadius:0,borderWidth:2,borderDash:[6,3]},
        ]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:sc}});
    }
  },80);
}

function closeModal(){document.getElementById("modal-root").innerHTML="";}

async function adminCreateUser(){
  const name=document.getElementById("nu-name").value.trim();
  const em=document.getElementById("nu-email").value.trim().toLowerCase();
  const pw=document.getElementById("nu-pw").value;
  const role=document.getElementById("nu-role").value;
  const err=document.getElementById("nu-err");
  if(!name||!em||!pw){err.textContent="Completa todos los campos";err.style.display="";return;}
  if(pw.length<6){err.textContent="Contraseña mínimo 6 caracteres";err.style.display="";return;}
  err.style.display="none";

  // Create user via Supabase Auth (admin API not available in anon, so use signUp)
  const {data,error}=await supa.auth.signUp({
    email:em, password:pw,
    options:{data:{name,role}}
  });
  if(error){err.textContent=error.message;err.style.display="";return;}

  // Update role in profiles table (trigger creates the profile)
  if(data.user){
    await new Promise(r=>setTimeout(r,800)); // wait for trigger
    await supa.from("profiles").update({role,name,avatar:name[0].toUpperCase()}).eq("id",data.user.id);
  }
  closeModal();toast(`Usuario "${name}" creado ✓`);
  await addAuditLog("create",`Usuario creado: ${name} (${em})`);
  admin();
}

async function adminDeleteUser(id,name){
  if(!confirm(`¿Eliminar permanentemente a "${name}"?\nSe borrarán todos sus datos.`))return;
  // Delete all user data from Supabase
  await Promise.all([
    supa.from("transactions").delete().eq("user_id",id),
    supa.from("budgets").delete().eq("user_id",id),
    supa.from("goals").delete().eq("user_id",id),
    supa.from("debts").delete().eq("user_id",id),
    supa.from("recurring").delete().eq("user_id",id),
    supa.from("notifications").delete().eq("user_id",id),
    supa.from("audit_log").delete().eq("user_id",id),
  ]);
  await supa.from("profiles").delete().eq("id",id);
  toast(`Usuario "${name}" eliminado`);
  await addAuditLog("delete",`Usuario eliminado: ${name} (${id})`);
  admin();
}

async function doDeposit(id){

  ST.goals=ST.goals.map(g=>g.id===id?{...g,saved:Math.min(g.target,g.saved+amt)}:g);

function selETT(v,id){
  document.getElementById("ett").value=v;
  ["expense","income"].forEach(t=>{const b=document.getElementById("ett-"+t);if(b)b.className="sbt"+(t===v?" on":"");});
  const s=document.getElementById("etc");
  if(s)s.innerHTML=`<option value="">Seleccionar...</option>`+CATS[v].map(c=>`<option>${c}</option>`).join("");
}
async function saveEditTx(id){
  const type=document.getElementById("ett").value;
  const amount=+document.getElementById("eta").value;
  const desc=document.getElementById("etd").value.trim();
  const date=document.getElementById("etdt").value;
  const cat=document.getElementById("etc").value;
  if(!amount||!desc||!cat){toast("Completa todos los campos","err");return;}
  const d=new Date(date);
  const updated={...ST.txs.find(t=>t.id===id),type,amount,description:desc,date,category:cat,month:d.getMonth(),year:d.getFullYear()};
  ST.txs=ST.txs.map(t=>t.id===id?updated:t);
  await saveTxToDB(updated);
  closeModal();toast("Transacción actualizada ✓");render();
}

                <div style="font-size:13px;font-weight:700">${esc(d.name)}</div>
                <div style="display:flex;gap:6px;align-items:center">

                <div><div style="font-size:9px;color:var(--mu)">Total</div><div style="font-size:12px;font-weight:700">${fmt(d.total)}</div></div>
                <div><div style="font-size:9px;color:var(--mu)">Pagado</div><div style="font-size:12px;font-weight:700;color:var(--inc)">${fmt(d.paid)}</div></div>

async function deleteDebt(id){
  if(!confirm("¿Eliminar esta deuda?"))return;
  ST.debts=ST.debts.filter(d=>d.id!==id);
  await deleteDebtFromDB(id);
  toast("Deuda eliminada");debts();
}

          <button onclick="toggleRecurring('${r.id}')" class="${r.active?"bg":"ba"}" style="font-size:10px;padding:4px 8px">${r.active?"Pausar":"Activar"}</button>
          <button onclick="deleteRecurring('${r.id}')" class="bd" style="font-size:10px;padding:4px 8px">✕</button>
        </div>
      </div>`).join("")}

  <div class="card">

    <button class="bp" onclick="applyAllRecurring()">▶▶ Aplicar todas para ${MO[ST.fM]} ${ST.fY}</button>
  </div>`;
}
async function toggleRecurring(id){
  ST.recurring=ST.recurring.map(r=>r.id===id?{...r,active:!r.active}:r);
  const r=ST.recurring.find(x=>x.id===id);
  if(r) await saveRecurringToDB(r);
  recurring();
}
async function applyRecurring(id){
  const r=ST.recurring.find(x=>x.id===id);if(!r||!r.active)return;
  const date=`${ST.fY}-${String(ST.fM+1).padStart(2,"0")}-${String(r.day).padStart(2,"0")}`;
  const d=new Date(date);
  const tx={id:uid(),type:r.type,amount:r.amount,category:r.category,description:r.description+" (recurrente)",date,month:d.getMonth(),year:d.getFullYear()};
  ST.txs.unshift(tx);
  await saveTxToDB(tx);
  toast(`"${r.description}" aplicada ✓`);
}
function applyAllRecurring(){
  const active=ST.recurring.filter(r=>r.active);
  if(!active.length){toast("Sin recurrentes activas","warn");return;}
  active.forEach(r=>applyRecurring(r.id));
  toast(`${active.length} transacciones aplicadas ✓`);render();
}
async function deleteRecurring(id){
  ST.recurring=ST.recurring.filter(r=>r.id!==id);
  await deleteRecurringFromDB(id);
  toast("Eliminada");recurring();
}

function notifications(){
  const unread=ST.notifs.filter(n=>!n.read).length;
  document.getElementById("content").innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:12px;font-weight:700">${unread>0?`${unread} sin leer`:"Todo al día"}</div>
      <div style="font-size:10px;color:var(--mu);margin-top:2px">Recordatorios y alertas del sistema</div>
    </div>
    <div style="display:flex;gap:7px">
      <button class="bp" onclick="openModal('add-notif')">＋ Recordatorio</button>
      ${unread>0?`<button class="bg" onclick="markAllRead()">✓ Marcar todo leído</button>`:""}
    </div>
  </div>

  <!-- Alertas automáticas -->
  ${(()=>{
    const auto=[];
    const txs=getF(), S=getS(txs);
    const alerts=getAlerts(txs);
    alerts.forEach(a=>auto.push({icon:"⚠",title:`Presupuesto ${a.cat} al ${fmtP(a.pct)}`,body:`Has gastado ${fmt(a.spent)} de ${fmt(a.limit)} en ${a.cat}.`,color:"#f59e0b",type:"auto"}));
    if(S.rate<10&&S.inc>0) auto.push({icon:"📉",title:"Tasa de ahorro baja",body:`Tu ahorro este mes es solo el ${fmtP(S.rate)}. Intenta reducir gastos.`,color:"var(--exp)",type:"auto"});
    ST.debts.filter(d=>d.nextDate&&d.paid<d.total).forEach(d=>{
      const days=Math.round((new Date(d.nextDate)-new Date())/(1000*60*60*24));
      if(days<=7) auto.push({icon:"🏦",title:`Pago próximo: ${d.name}`,body:`Vence el ${d.nextDate} (en ${days} días). Cuota: ${fmt(d.quota)}.`,color:"var(--exp)",type:"auto"});
    });
    ST.recurring.filter(r=>r.active).forEach(r=>{
      const today=new Date().getDate();
      if(Math.abs(today-r.day)<=2) auto.push({icon:"↻",title:`Recurrente próxima: ${r.description}`,body:`Se aplica el día ${r.day}. Monto: ${fmt(r.amount)}.`,color:"var(--acc)",type:"auto"});
    });
    if(!auto.length) return "";
    return`<div class="card">
      <div style="font-size:12px;font-weight:700;margin-bottom:12px">🔔 Alertas automáticas</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${auto.map(a=>`<div style="display:flex;gap:12px;padding:12px;background:${a.color}10;border:1px solid ${a.color}25;border-radius:10px;align-items:flex-start">
          <span style="font-size:20px;flex-shrink:0">${a.icon}</span>
          <div><div style="font-size:12px;font-weight:700;margin-bottom:2px">${a.title}</div><div style="font-size:11px;color:var(--mu)">${a.body}</div></div>
        </div>`).join("")}
      </div>
    </div>`;
  })()}

  <!-- Recordatorios del usuario -->
  <div class="card">
    <div style="font-size:12px;font-weight:700;margin-bottom:12px">📋 Mis recordatorios</div>
    ${ST.notifs.length===0?`<p style="color:var(--mu);font-size:12px;text-align:center;padding:16px 0">Sin recordatorios. Crea uno con el botón ＋</p>`:`
    <div style="display:flex;flex-direction:column;gap:7px">
      ${[...ST.notifs].reverse().map(n=>`
      <div style="display:flex;align-items:flex-start;gap:11px;padding:12px;background:${n.read?"var(--s2)":"var(--s3)"};border-radius:10px;border:1px solid ${n.read?"var(--br)":"var(--br2)"}">
        <div style="width:36px;height:36px;border-radius:9px;background:${n.color||"var(--acc)"}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${n.icon||"🔔"}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div>
              <div style="font-size:12px;font-weight:${n.read?500:700}">${esc(n.title)}</div>
              <div style="font-size:10px;color:var(--mu);margin-top:2px">${esc(n.body)}</div>
              ${n.date?`<div style="font-size:9px;color:var(--mu);margin-top:3px">📅 ${n.date}</div>`:""}
            </div>
            <div style="display:flex;gap:5px;flex-shrink:0">
              ${!n.read?`<button onclick="markRead('${n.id}')" class="ba" style="font-size:9px;padding:3px 7px">✓ Leído</button>`:""}
              <button onclick="deleteNotif('${n.id}')" class="bd" style="font-size:9px;padding:3px 7px">✕</button>
            </div>
          </div>
        </div>
      </div>`).join("")}
    </div>`}
  </div>`;

  // Update topbar badge
  updateNotifBadge();
}
async function markRead(id){
  ST.notifs=ST.notifs.map(n=>n.id===id?{...n,read:true}:n);
  await supa.from("notifications").update({read:true}).eq("id",id).eq("user_id",ST.user.uid);
  notifications();
}
async function markAllRead(){
  ST.notifs=ST.notifs.map(n=>({...n,read:true}));
  await supa.from("notifications").update({read:true}).eq("user_id",ST.user.uid);
  notifications();
}
async function deleteNotif(id){
  ST.notifs=ST.notifs.filter(n=>n.id!==id);
  await supa.from("notifications").delete().eq("id",id).eq("user_id",ST.user.uid);
  notifications();
}
function updateNotifBadge(){
  const unread=ST.notifs.filter(n=>!n.read).length;
  // Update nav label
  const nb=document.getElementById("n-notifications");
  if(nb){
    const label=nb.querySelector("span:last-child");
    if(label) label.textContent=`Notificaciones${unread>0?" ("+unread+")":""}`;
  }
}

async function saveDebt(existingId){
  const name=document.getElementById("dn").value.trim();
  const total=+document.getElementById("dt").value;
  if(!name||!total){toast("Nombre y monto requeridos","err");return;}
  const debt={
    id:existingId||uid(), name, total,
    paid:+document.getElementById("dp").value||0,
    quota:+document.getElementById("dq").value||0,
    rate:+document.getElementById("dr").value||0,
    nextDate:document.getElementById("dd").value,
    icon:document.getElementById("dic").value,
    color:document.getElementById("dc").value||"#f43f5e",
    notes:document.getElementById("dnote").value,
  };
  if(existingId) ST.debts=ST.debts.map(d=>d.id===existingId?debt:d);
  else ST.debts.push(debt);
  await saveDebtToDB(debt);
  closeModal();toast(existingId?"Deuda actualizada ✓":"Deuda registrada ✓");debts();
}

async function registerDebtPayment(id){
  addAuditLog("pay","Pago de deuda registrado");
  const amt=+document.getElementById("pay-amt").value;
  const date=document.getElementById("pay-date").value;
  if(!amt||amt<=0){toast("Ingresa un monto","err");return;}
  ST.debts=ST.debts.map(d=>d.id===id?{...d,paid:Math.min(d.total,d.paid+amt)}:d);
  const debt=ST.debts.find(x=>x.id===id);
  await saveDebtToDB(debt);
  const d2=new Date(date);
  const tx={id:uid(),type:"expense",amount:amt,category:"Deudas",description:`Pago ${debt?.name||"deuda"}`,date,month:d2.getMonth(),year:d2.getFullYear()};
  ST.txs.unshift(tx);
  await saveTxToDB(tx);
  closeModal();toast("Pago registrado ✓");debts();
}

  addAuditLog("create","Nueva transacción recurrente creada");

// MULTI-MONEDA
// ════════════════════════════════════════
const CURRENCIES={
  COP:{symbol:"$",name:"Peso colombiano",rate:1},
  USD:{symbol:"$",name:"Dólar estadounidense",rate:0.00025},
  EUR:{symbol:"€",name:"Euro",rate:0.00023},
  MXN:{symbol:"$",name:"Peso mexicano",rate:0.0043},
  ARS:{symbol:"$",name:"Peso argentino",rate:0.29},
  BRL:{symbol:"R$",name:"Real brasileño",rate:0.00126},
  GBP:{symbol:"£",name:"Libra esterlina",rate:0.0002},
  CLP:{symbol:"$",name:"Peso chileno",rate:0.245},
};

function getCurrency(){return ST.settings?.currency||"COP";}
function getRate(){return CURRENCIES[getCurrency()]?.rate||1;}
function fmtCur(n){
  const cur=getCurrency();
  const rate=getRate();
  const converted=n*rate;
  const sym=CURRENCIES[cur]?.symbol||"$";
  if(cur==="COP") return new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n||0);
  if(converted>=1e6) return `${sym}${(converted/1e6).toFixed(2)}M`;
  if(converted>=1e3) return `${sym}${(converted/1e3).toFixed(1)}K`;
  return `${sym}${converted.toFixed(2)}`;
}
// Override fmt globally when currency changes
function applyFmtOverride(){
  window._fmtOrig=window._fmtOrig||fmt;
}

let _importPreview=[];

function handleDrop(e){
  e.preventDefault();
  document.getElementById("drop-zone").style.borderColor="var(--br2)";
  const file=e.dataTransfer.files[0];
  if(file) processCSVFile(file);
}
function handleCSVFile(e){
  const file=e.target.files[0];
  if(file) processCSVFile(file);
}
function processCSVFile(file){
  const reader=new FileReader();
  reader.onload=(e)=>{
    const text=e.target.result;
    parseCSV(text);
  };
  reader.readAsText(file,"UTF-8");
}
function parseCSV(text){
  const lines=text.trim().split("\n").filter(l=>l.trim());
  const rows=lines.slice(1); // skip header
  const results=[],errors=[];
  rows.forEach((line,i)=>{
    const cols=line.split(",").map(c=>c.trim().replace(/^"|"$/g,""));
    if(cols.length<5){errors.push(`Fila ${i+2}: columnas insuficientes`);return;}
    const [dateStr,type,category,description,amountStr]=cols;
    const amount=parseFloat(amountStr.replace(/[^0-9.]/g,""));
    const d=new Date(dateStr);
    if(isNaN(d.getTime())){errors.push(`Fila ${i+2}: fecha inválida "${dateStr}"`);return;}
    if(!["income","expense"].includes(type)){errors.push(`Fila ${i+2}: tipo inválido "${type}"`);return;}
    if(isNaN(amount)||amount<=0){errors.push(`Fila ${i+2}: monto inválido "${amountStr}"`);return;}
    results.push({id:uid(),type,amount,category:category||"Otros",description,date:dateStr,month:d.getMonth(),year:d.getFullYear()});
  });
  _importPreview=results;
  showImportPreview(results,errors);
}
function showImportPreview(results,errors){
  const card=document.getElementById("preview-card");
  const content=document.getElementById("preview-content");
  if(!card||!content)return;
  card.style.display="";
  content.innerHTML=`
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      <div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:8px 14px;font-size:12px"><strong style="color:var(--inc)">${results.length}</strong> <span style="color:var(--mu)">válidas</span></div>
      ${errors.length?`<div style="background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);border-radius:8px;padding:8px 14px;font-size:12px"><strong style="color:var(--exp)">${errors.length}</strong> <span style="color:var(--mu)">errores</span></div>`:""}
    </div>
    ${errors.length?`<div style="background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.15);border-radius:9px;padding:10px;margin-bottom:12px;font-size:10px;color:var(--exp);">${errors.slice(0,5).map(e=>`<div>⚠ ${esc(e)}</div>`).join("")}${errors.length>5?`<div>... y ${errors.length-5} más</div>`:""}</div>`:""}
    <div style="max-height:240px;overflow-y:auto">
      <table style="min-width:400px"><thead><tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Descripción</th><th style="text-align:right">Monto</th></tr></thead>
      <tbody>${results.slice(0,20).map(t=>`<tr>
        <td style="font-size:10px;color:var(--mu)">${t.date}</td>
        <td>${t.type==="income"?'<span class="bi">Ingreso</span>':'<span class="be">Egreso</span>'}</td>
        <td style="font-size:10px">${esc(t.category)}</td>
        <td style="font-size:10px;color:var(--mu2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.description)}</td>
        <td style="text-align:right;font-weight:700;font-size:11px;color:${t.type==="income"?"var(--inc)":"var(--exp)"}">${fmt(t.amount)}</td>
      </tr>`).join("")}${results.length>20?`<tr><td colspan="5" style="text-align:center;color:var(--mu);font-size:10px;padding:8px">... y ${results.length-20} más</td></tr>`:""}</tbody></table>
    </div>`;
}
function clearPreview(){_importPreview=[];document.getElementById("preview-card").style.display="none";}
async function confirmImport(){
  if(!_importPreview.length){toast("Sin datos para importar","warn");return;}
  showLoadingOverlay(true);
  let ok=0, fail=0;
  for(const tx of _importPreview){
    try{
      await saveTxToDB(tx);
      ST.txs.unshift(tx);
      ok++;
    }catch(e){ fail++; }
  }

  toast(`${ok} transacciones importadas ✓${fail>0?` · ${fail} errores`:""}`);
  _importPreview=[];
  clearPreview();
  go("transactions");
}

// 2. METAS CON PROYECCIÓN DE CUMPLIMIENTO
// ════════════════════════════════════════
function goals(){
  // Calcular ahorro mensual promedio de últimos 3 meses para proyectar
  const m12=getM12();
  const avgSavings=m12.slice(-3).reduce((a,m)=>a+Math.max(0,m.net),0)/3;

  document.getElementById("content").innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:12px;font-weight:700">${ST.goals.length} metas activas</div>
      <div style="font-size:10px;color:var(--mu);margin-top:2px">Ahorro mensual disponible estimado: <strong style="color:var(--inc)">${fmt(avgSavings)}</strong></div>
    </div>
    <button class="bp" onclick="openModal('goal')">＋ Nueva meta</button>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
    ${ST.goals.map(g=>{
      const p=Math.min(100,g.saved/g.target*100), done=p>=100;
      const remaining=g.target-g.saved;

      // Proyección: meses necesarios con ahorro promedio
      let projMonths=null, projDate=null, projLabel="";
      if(!done && remaining>0 && avgSavings>0){
        projMonths=Math.ceil(remaining/avgSavings);
        const d=new Date();
        d.setMonth(d.getMonth()+projMonths);
        projDate=d.toLocaleDateString("es-CO",{month:"long",year:"numeric"});
        projLabel=projMonths<=1?"Este mes":projMonths<=3?"Muy pronto 🚀":projMonths<=6?"En pocos meses 📈":projMonths<=12?"Este año 📅":"Largo plazo ⏳";
      }

      // ¿Llegará antes de la deadline?
      let deadlineWarning="";
      if(g.deadline&&!done&&projMonths!==null){
        const dl=new Date(g.deadline);
        const now=new Date();
        const monthsLeft=Math.round((dl-now)/(1000*60*60*24*30));
        if(projMonths>monthsLeft) deadlineWarning=`<div style="background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);border-radius:7px;padding:8px 10px;font-size:10px;color:var(--exp);margin-bottom:10px">⚠ A este ritmo no llegarás antes del ${g.deadline}</div>`;
        else if(projMonths<=monthsLeft) deadlineWarning=`<div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:7px;padding:8px 10px;font-size:10px;color:var(--inc);margin-bottom:10px">✓ Llegarás antes del plazo</div>`;
      }

      return`<div class="card" style="position:relative;border-color:${done?"rgba(16,185,129,.3)":"var(--br)"}">
        ${done?`<span class="bi" style="position:absolute;top:12px;right:12px">✓ Completada</span>`:""}
        <div style="font-size:28px;margin-bottom:9px">${g.icon}</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:3px">${esc(g.name)}</div>
        ${g.note?`<div style="font-size:10px;color:var(--mu);margin-bottom:6px">${esc(g.note)}</div>`:""}
        ${g.deadline?`<div style="font-size:9px;color:var(--mu);margin-bottom:8px">📅 Fecha límite: ${g.deadline}</div>`:""}

        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:10px;color:var(--mu)">${fmt(g.saved)} ahorrado</span>
            <span style="font-size:11px;font-weight:700;color:${done?"var(--inc)":g.color}">${fmtP(p)}</span>
          </div>
          ${prog(p,g.color,8)}
          <div style="display:flex;justify-content:space-between;margin-top:3px">
            <span style="font-size:9px;color:var(--mu)">Falta: ${fmt(remaining)}</span>
            <span style="font-size:9px;color:var(--mu)">Meta: ${fmt(g.target)}</span>
          </div>
        </div>

        ${deadlineWarning}

        ${!done&&projMonths!==null?`
        <div style="background:${g.color}10;border:1px solid ${g.color}25;border-radius:8px;padding:10px;margin-bottom:10px">
          <div style="font-size:10px;color:var(--mu);margin-bottom:3px">Proyección al ritmo actual</div>
          <div style="font-size:12px;font-weight:700;color:${g.color}">${projLabel}</div>
          <div style="font-size:10px;color:var(--mu);margin-top:1px">${projDate} · ${projMonths} mes${projMonths!==1?"es":""}</div>
          <div style="margin-top:6px">
            <div style="font-size:9px;color:var(--mu);margin-bottom:2px">Ahorro mensual necesario para cumplir en plazo:</div>
            <div style="font-size:11px;font-weight:700;color:var(--acc)">${g.deadline?(()=>{const dl=new Date(g.deadline),now=new Date(),months=Math.max(1,Math.round((dl-now)/(1000*60*60*24*30)));return fmt(Math.ceil(remaining/months));})():"—"}</div>
          </div>
        </div>`:""}
        ${!done&&avgSavings===0?`<div style="font-size:10px;color:var(--mu);margin-bottom:10px;padding:8px;background:var(--s2);border-radius:7px">Sin datos de ahorro reciente para proyectar</div>`:""}

        <div style="display:flex;gap:7px">
          ${!done?`<button class="ba" style="flex:1;font-size:11px" onclick="openModal('deposit','${g.id}')">💰 Depositar</button>`:""}
          <button class="bg" style="padding:7px 10px;font-size:11px" onclick="deleteGoal('${g.id}')">✕</button>
        </div>
      </div>`;
    }).join("")}
    ${ST.goals.length===0?`<div class="card" style="text-align:center;padding:32px;grid-column:1/-1"><div style="font-size:32px;margin-bottom:12px">🎯</div><div style="font-size:14px;font-weight:700;margin-bottom:6px">Sin metas aún</div><p style="font-size:12px;color:var(--mu);margin-bottom:16px">Crea tu primera meta de ahorro</p><button class="bp" onclick="openModal('goal')">＋ Crear meta</button></div>`:""}
  </div>`;
}

// 3. PRESUPUESTOS INTELIGENTES
// ════════════════════════════════════════
function budgets(){
  const txs=getF();
  const m12=getM12();

  // Calcular promedios por categoría (últimos 3 meses)
  const avgByCat={};
  CATS.expense.forEach(cat=>{
    const vals=m12.slice(-3).map(m=>{
      const t=ST.txs.filter(x=>x.month===m.m&&x.year===m.y&&x.type==="expense"&&x.category===cat);
      return t.reduce((a,x)=>a+x.amount,0);
    });
    avgByCat[cat]=vals.reduce((a,v)=>a+v,0)/3;
  });

  document.getElementById("content").innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:12px;font-weight:700">Presupuestos por categoría</div>
      <div style="font-size:10px;color:var(--mu);margin-top:2px">Alerta al superar el 70%. Sugerencias basadas en tu historial.</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="ba" onclick="applySuggestions()">✨ Aplicar sugerencias</button>
      <button class="bp" onclick="saveBudgets()">Guardar cambios</button>
    </div>
  </div>

  <!-- Resumen rápido -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
    ${(()=>{
      const total=Object.values(ST.budgets).reduce((a,v)=>a+v,0);
      const spent=CATS.expense.reduce((a,cat)=>a+txs.filter(t=>t.type==="expense"&&t.category===cat).reduce((b,t)=>b+t.amount,0),0);
      const over=CATS.expense.filter(cat=>{const l=ST.budgets[cat]||0;const s=txs.filter(t=>t.type==="expense"&&t.category===cat).reduce((a,t)=>a+t.amount,0);return l>0&&s>l;}).length;
      return[
        {l:"Presupuesto total",v:fmt(total),c:"var(--acc)"},
        {l:"Gastado este mes",v:fmt(spent),c:spent>total?"var(--exp)":"var(--inc)"},
        {l:"Categorías excedidas",v:over,c:over>0?"var(--exp)":"var(--inc)"},
      ].map(k=>`<div class="card"><div style="font-size:10px;color:var(--mu);margin-bottom:4px">${k.l}</div><div style="font-size:20px;font-weight:800;color:${k.c}">${k.v}</div></div>`).join("");
    })()}
  </div>

  <div class="ga">
    ${CATS.expense.map(cat=>{
      const limit=ST.budgets[cat]||0;
      const spent=txs.filter(t=>t.type==="expense"&&t.category===cat).reduce((a,t)=>a+t.amount,0);
      const pct=limit>0?Math.min(100,spent/limit*100):0;
      const color=pct>=100?"var(--exp)":pct>=70?"#f59e0b":"var(--inc)";
      const avg=avgByCat[cat]||0;
      const suggested=Math.ceil(avg*1.1/10000)*10000; // 10% sobre promedio, redondeado
      const hasData=avg>0;

      return`<div class="card" style="border-color:${pct>=70?color.replace("var(--exp)","rgba(244,63,94,.35)").replace("#f59e0b","rgba(245,158,11,.35)").replace("var(--inc)","var(--br)"):"var(--br)"}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px">
          <div>
            <div style="font-size:12px;font-weight:700">${esc(cat)}</div>
            <div style="font-size:9px;color:var(--mu);margin-top:2px">Gastado: ${fmt(spent)}</div>
          </div>
          <span style="font-size:12px;font-weight:800;color:${color}">${limit>0?fmtP(pct):"—"}</span>
        </div>
        ${limit>0?`${prog(pct,color.replace("var(--exp)","#f43f5e").replace("var(--inc)","#10b981").replace("var(--br)","#ccc"),7)}`:""}
        <div style="display:flex;align-items:center;gap:6px;margin-top:8px">
          <span style="font-size:10px;color:var(--mu);flex-shrink:0">Límite $</span>
          <input type="number" class="inp inp-s" id="b-${cat.replace(/\s/g,"_")}" value="${limit||""}" placeholder="Sin límite" style="width:100%">
        </div>
        ${hasData?`<div style="margin-top:7px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:9px;color:var(--mu)">Sugerido (prom. 3m + 10%): <strong style="color:var(--acc)">${fmt(suggested)}</strong></span>
          <button onclick="document.getElementById('b-${cat.replace(/\s/g,"_")}').value='${suggested}'" style="background:none;border:none;color:var(--acc);font-size:9px;cursor:pointer;padding:0;font-weight:600">Aplicar →</button>
        </div>`:`<div style="margin-top:6px;font-size:9px;color:var(--mu)">Sin historial para sugerir</div>`}
      </div>`;
    }).join("")}
  </div>`;
}

async function saveBudgets(){
  CATS.expense.forEach(cat=>{
    const el=document.getElementById("b-"+cat.replace(/\s/g,"_"));
    if(el) ST.budgets[cat]=+el.value||0;
  });
  await saveBudgetsToDB();
  toast("Presupuestos guardados ✓");
  addAuditLog("edit","Presupuestos actualizados");
}

async function applySuggestions(){
  const m12=getM12();
  CATS.expense.forEach(cat=>{
    const vals=m12.slice(-3).map(m=>{
      const t=ST.txs.filter(x=>x.month===m.m&&x.year===m.y&&x.type==="expense"&&x.category===cat);
      return t.reduce((a,x)=>a+x.amount,0);
    });
    const avg=vals.reduce((a,v)=>a+v,0)/3;
    if(avg>0) ST.budgets[cat]=Math.ceil(avg*1.1/10000)*10000;
  });
  await saveBudgetsToDB();
  toast("Sugerencias aplicadas ✓");addAuditLog("edit","Presupuestos inteligentes aplicados");budgets();
}

// 4. RESUMEN SEMANAL
// ════════════════════════════════════════
function weekly(){
  const now=new Date();
  const dayOfWeek=now.getDay();
  const startOfWeek=new Date(now);
  startOfWeek.setDate(now.getDate()-dayOfWeek);
  startOfWeek.setHours(0,0,0,0);
  const endOfWeek=new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate()+6);
  endOfWeek.setHours(23,59,59,999);

  const prevStart=new Date(startOfWeek);prevStart.setDate(prevStart.getDate()-7);
  const prevEnd=new Date(endOfWeek);prevEnd.setDate(prevEnd.getDate()-7);

  const isThisWeek=t=>{const d=new Date(t.date);return d>=startOfWeek&&d<=endOfWeek;};
  const isLastWeek=t=>{const d=new Date(t.date);return d>=prevStart&&d<=prevEnd;};

  const thisW=ST.txs.filter(isThisWeek);
  const lastW=ST.txs.filter(isLastWeek);
  const SW=getS(thisW), SL=getS(lastW);

  const fmtDate=d=>d.toLocaleDateString("es-CO",{day:"numeric",month:"short"});
  const diff=(a,b)=>b>0?((a-b)/b)*100:a>0?100:0;
  const arrow=(d,inv=false)=>{
    const good=(inv?d<0:d>0);
    return d===0?`<span style="color:var(--mu)">Sin cambio</span>`:
      `<span style="color:${good?"var(--inc)":"var(--exp)"}">${d>0?"▲":"▼"} ${fmtP(Math.abs(d))}</span>`;
  };

  // Día con más gasto esta semana
  const dayTotals={};
  thisW.filter(t=>t.type==="expense").forEach(t=>{
    const d=new Date(t.date).toLocaleDateString("es-CO",{weekday:"long"});
    dayTotals[d]=(dayTotals[d]||0)+t.amount;
  });
  const topDay=Object.entries(dayTotals).sort((a,b)=>b[1]-a[1])[0];

  // Categoría top
  const catThisW=getCE(thisW);

  // Días de la semana para mini calendario
  const days=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  document.getElementById("content").innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:14px;font-weight:800">Resumen semanal</div>
      <div style="font-size:11px;color:var(--mu);margin-top:3px">${fmtDate(startOfWeek)} — ${fmtDate(endOfWeek)}</div>
    </div>
    <button class="ba" onclick="sendWeeklyEmail()">📧 Enviar resumen por email</button>
  </div>

  <!-- KPI semana actual vs anterior -->
  <div class="g4">
    ${[
      {l:"Ingresos semana",cur:SW.inc,prev:SL.inc,c:"var(--inc)"},
      {l:"Egresos semana",cur:SW.exp,prev:SL.exp,c:"var(--exp)",inv:true},
      {l:"Saldo neto",cur:SW.bal,prev:SL.bal,c:SW.bal>=0?"var(--inc)":"var(--exp)"},
      {l:"Transacciones",cur:thisW.length,prev:lastW.length,c:"var(--acc)"},
    ].map(k=>`<div class="card" style="position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${k.c};border-radius:13px 13px 0 0"></div>
      <div style="font-size:10px;color:var(--mu);margin:4px 0 5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px">${k.l}</div>
      <div style="font-size:18px;font-weight:800;color:${k.c};margin-bottom:5px">${typeof k.cur==="number"&&k.cur>999?fmtK(k.cur):k.cur}</div>
      <div style="font-size:10px">${arrow(diff(k.cur,k.prev),k.inv)} vs semana anterior</div>
    </div>`).join("")}
  </div>

  <!-- Mini calendario semanal -->
  <div class="card">
    <div style="font-size:12px;font-weight:700;margin-bottom:14px">Actividad diaria esta semana</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">
      ${days.map((day,i)=>{
        const d=new Date(startOfWeek);d.setDate(d.getDate()+i);
        const dateStr=d.toISOString().slice(0,10);
        const dayTxs=ST.txs.filter(t=>t.date===dateStr);
        const dayInc=dayTxs.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
        const dayExp=dayTxs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
        const isToday=dateStr===tod();
        return`<div style="text-align:center;padding:10px 4px;background:${isToday?"var(--al)":"var(--s2)"};border-radius:10px;border:1px solid ${isToday?"var(--acc)":"var(--br)"}">
          <div style="font-size:9px;color:var(--mu);margin-bottom:4px">${day}</div>
          <div style="font-size:13px;font-weight:700;color:${isToday?"var(--acc)":"var(--tx)"}">${d.getDate()}</div>
          ${dayTxs.length>0?`
            <div style="margin-top:6px;display:flex;flex-direction:column;gap:2px">
              ${dayInc>0?`<div style="font-size:8px;color:var(--inc);font-weight:600">+${fmtK(dayInc)}</div>`:""}
              ${dayExp>0?`<div style="font-size:8px;color:var(--exp);font-weight:600">-${fmtK(dayExp)}</div>`:""}
              <div style="font-size:8px;color:var(--mu)">${dayTxs.length} mov.</div>
            </div>`:`<div style="margin-top:8px;font-size:8px;color:var(--mu)">—</div>`}
        </div>`;
      }).join("")}
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <!-- Top categorías semana -->
    <div class="card">
      <div style="font-size:12px;font-weight:700;margin-bottom:12px">Top gastos de la semana</div>
      ${catThisW.length===0?`<p style="color:var(--mu);font-size:11px">Sin gastos esta semana</p>`:catThisW.slice(0,5).map(([cat,amt],i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--br)">
        <div style="width:24px;height:24px;border-radius:7px;background:${CC[i%CC.length]}18;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${CC[i%CC.length]};flex-shrink:0">${i+1}</div>
        <div style="flex:1;font-size:12px">${esc(cat)}</div>
        <div style="font-size:12px;font-weight:700;color:var(--exp)">${fmt(amt)}</div>
      </div>`).join("")}
    </div>

    <!-- Insights -->
    <div class="card">
      <div style="font-size:12px;font-weight:700;margin-bottom:12px">💡 Insights de la semana</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${(()=>{
          const insights=[];
          if(SW.exp>SL.exp) insights.push({i:"📈",t:"Gastos aumentaron",d:`Gastaste ${fmt(SW.exp-SL.exp)} más que la semana pasada`,c:"var(--exp)"});
          else if(SW.exp<SL.exp) insights.push({i:"📉",t:"Gastos disminuyeron",d:`Ahorraste ${fmt(SL.exp-SW.exp)} vs semana pasada`,c:"var(--inc)"});
          if(topDay) insights.push({i:"📅",t:`Día más activo: ${topDay[0]}`,d:`Gastaste ${fmt(topDay[1])} ese día`,c:"var(--acc)"});
          if(catThisW[0]) insights.push({i:"🏷",t:`Mayor gasto: ${catThisW[0][0]}`,d:`${fmt(catThisW[0][1])} esta semana`,c:"#f59e0b"});
          if(thisW.length===0) insights.push({i:"😴",t:"Semana sin movimientos",d:"No registraste transacciones esta semana",c:"var(--mu)"});
          if(!insights.length) insights.push({i:"✓",t:"Semana tranquila",d:"Todo bajo control esta semana",c:"var(--inc)"});
          return insights.map(ins=>`<div style="display:flex;gap:9px;padding:9px;background:${ins.c}0f;border-radius:8px;border-left:3px solid ${ins.c}">
            <span style="font-size:18px;flex-shrink:0">${ins.i}</span>
            <div><div style="font-size:11px;font-weight:700">${ins.t}</div><div style="font-size:10px;color:var(--mu)">${ins.d}</div></div>
          </div>`).join("");
        })()}
      </div>
    </div>
  </div>

  <!-- Transacciones de la semana -->
  <div class="card">
    <div style="font-size:12px;font-weight:700;margin-bottom:12px">Transacciones de la semana (${thisW.length})</div>
    ${thisW.length===0
      ?`<p style="color:var(--mu);font-size:11px;text-align:center;padding:16px 0">Sin movimientos esta semana</p>`
      :`<div style="overflow-x:auto"><table style="min-width:440px"><thead><tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Descripción</th><th style="text-align:right">Monto</th></tr></thead>
      <tbody>${[...thisW].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`<tr>
        <td style="color:var(--mu);font-size:10px">${t.date}</td>
        <td>${t.type==="income"?'<span class="bi">Ingreso</span>':'<span class="be">Egreso</span>'}</td>
        <td style="font-size:11px">${esc(t.category)}</td>
        <td style="font-size:10px;color:var(--mu2)">${esc(t.description)}</td>
        <td style="text-align:right;font-weight:700;font-size:11px;color:${tc(t.type)}">${fmt(t.amount)}</td>
      </tr>`).join("")}</tbody></table></div>`}
  </div>`;
}

async function sendWeeklyEmail(){
  const now=new Date();
  const startOfWeek=new Date(now);startOfWeek.setDate(now.getDate()-now.getDay());startOfWeek.setHours(0,0,0,0);
  const endOfWeek=new Date(startOfWeek);endOfWeek.setDate(startOfWeek.getDate()+6);endOfWeek.setHours(23,59,59,999);
  const thisW=ST.txs.filter(t=>{const d=new Date(t.date);return d>=startOfWeek&&d<=endOfWeek;});
  const SW=getS(thisW);
  const n={
    id:uid(),
    title:"Resumen semanal enviado",
    body:`Ing: ${fmt(SW.inc)} | Eg: ${fmt(SW.exp)} | Saldo: ${fmt(SW.bal)}. Enviado a ${ST.user.email}`,
    icon:"📧",color:"#3b82f6",read:false,
    date:now.toLocaleDateString("es-CO"),
    createdAt:now.toISOString()
  };
  ST.notifs.push(n);
  await saveNotifToDB(n);
  addAuditLog("export",`Resumen semanal enviado a ${ST.user.email}`);
  toast(`Resumen enviado a ${ST.user.email} ✓`);
}

// Override dashboard para incluir widget de resumen semanal
function dashboard(){
  _dashboardBase();
  // Inject weekly mini widget after content loads
  setTimeout(()=>{
    const content=document.getElementById("content");
    if(!content)return;
    const now=new Date();
    const startOfWeek=new Date(now);startOfWeek.setDate(now.getDate()-now.getDay());startOfWeek.setHours(0,0,0,0);
    const endOfWeek=new Date(startOfWeek);endOfWeek.setDate(startOfWeek.getDate()+6);endOfWeek.setHours(23,59,59,999);
    const thisW=ST.txs.filter(t=>{const d=new Date(t.date);return d>=startOfWeek&&d<=endOfWeek;});
    const SW=getS(thisW);
    const fmtDate=d=>d.toLocaleDateString("es-CO",{day:"numeric",month:"short"});

    // Append weekly mini widget
    const widget=document.createElement("div");
    widget.innerHTML=`<div class="card" style="border-color:rgba(163,94,71,.25)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:12px;font-weight:700">◫ Esta semana <span style="font-size:10px;color:var(--mu);font-weight:400">${fmtDate(startOfWeek)} — ${fmtDate(endOfWeek)}</span></div>
        <button class="bg" style="padding:3px 8px;font-size:9px" onclick="go('weekly')">Ver detalle →</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${[
          {l:"Ingresos",v:SW.inc,c:"var(--inc)"},
          {l:"Egresos",v:SW.exp,c:"var(--exp)"},
          {l:"Saldo",v:SW.bal,c:SW.bal>=0?"var(--inc)":"var(--exp)"},
          {l:"Movimientos",v:thisW.length,c:"var(--acc)"},
        ].map(k=>`<div style="text-align:center;padding:10px;background:var(--s2);border-radius:9px">
          <div style="font-size:9px;color:var(--mu);margin-bottom:4px">${k.l}</div>
          <div style="font-size:14px;font-weight:800;color:${k.c}">${k.l==="Movimientos"?k.v:fmtK(k.v)}</div>
        </div>`).join("")}
      </div>
    </div>`;
    content.appendChild(widget.firstElementChild);
  },100);
}

// BOOT

// ════════════════════════════════════════
// BOOT — check existing session
// ════════════════════════════════════════
async function bootApp(){
  // Render login (replaces static pre-rendered HTML with properly event-wired version)
  renderLoginBox();

  // Then check if there's an existing session in background
  try{
    const {data:{session}} = await supa.auth.getSession();
    if(session?.user){
      await afterLogin(session.user);
    }
  }catch(e){
    console.error("Session check failed:", e);
  }

  // Listen for auth state changes
  supa.auth.onAuthStateChange(async (event, session)=>{
    if(event==="SIGNED_OUT"){
      ST.user=null;
      document.getElementById("app").style.display="none";
      document.getElementById("lp").style.display="flex";
      loginMode="login";
      renderLoginBox();
    }
    if(event==="SIGNED_IN" && session?.user && !ST.user){
      await afterLogin(session.user);
    }
  });
}
bootApp();
